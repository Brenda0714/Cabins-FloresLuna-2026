@if (showAlert) {
<div
  class="fixed inset-0 bg-black/50 backdrop-blur-xs z-9999 flex items-center justify-center p-4 animate-fade animate-duration-200">

  <div
    class="bg-white rounded-2xl shadow-2xl border-2 max-w-sm w-full p-6 text-center transform transition-all pointer-events-auto animate-scale-up"
    [class.border-emerald-500]="alertType === 'success'" [class.border-red-500]="alertType === 'error'">

    <div class="mx-auto flex items-center justify-center h-14 w-14 rounded-full mb-4"
      [class.bg-emerald-100]="alertType === 'success'" [class.bg-red-100]="alertType === 'error'">

      @if (alertType === 'success') {
      <svg class="h-8 w-8 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
      </svg>
      } @else {
      <svg class="h-8 w-8 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
      }
    </div>

    <h3 class="g-text text-lg font-serif font-bold text-olive-900 mb-2">
      {{ alertType === 'success' ? '¡Operación Exitosa!' : '¡Algo salió mal!' }}
    </h3>

    <p class="g-text text-sm text-olive-600 font-light mb-6">
      {{ alertMessage }}
    </p>

    <button (click)="showAlert = false" type="button" class="g-text w-full py-2.5 px-4 text-sm font-medium"
      [class.bg-none]="alertType === 'success'" [class.text-emerald-600]="alertType === 'success'"
      [class.bg-none]="alertType === 'error'" [class.text-red-600]="alertType === 'error'">
      Espere un momento...
    </button>

  </div>
</div>
}

<div class="min-h-screen w-full flex items-center justify-center bg-cover bg-center relative"
  style="background-image: url('assets/img/hero-cabin.png');">

  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>

  <div
    class="bg-white/95 relative z-10 w-full max-w-md p-8 md:p-10 rounded-2xl shadow-2xl mx-4 transition-all animate-fade-center mb-5 mt-5">

    <a [routerLink]="['/home']"
      class="g-text inline-flex items-center gap-2 text-xs text-olive-500 hover:text-[#D18B73] mb-6 transition-colors group">
      ← Volver al inicio
    </a>

    <div class="text-center mb-8">
      <img src="/assets/img/LOGO.png" alt="Flores de la Luna" class="h-40 mx-auto object-contain mb-3">
      <h2 class="g-text text-2xl font-serif font-semibold text-olive-900">Iniciar Sesión</h2>
      <p class="g-text text-sm text-olive-500 font-light mt-1">Qué gusto tenerte de vuelta</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="space-y-5">

      <div class="g-text">
        <label class="g-text block text-xs font-medium text-olive-700 uppercase tracking-wider mb-2">Correo
          Electrónico</label>
        <input type="email" formControlName="correo" placeholder="ejemplo@correo.com" autocomplete="off"
          class="g-text w-full px-3 py-3 rounded-xl border border-olive-200 text-sm focus:outline-none focus:border-[#D18B73] focus:ring-1 focus:ring-[#D18B73] transition-all bg-olive-300">
      </div>

      <div>
        <div class="flex justify-between items-center mb-2">
          <label class="g-text block text-xs font-medium text-olive-700 uppercase tracking-wider">Contraseña</label>
          <a class="g-text text-xs text-olive-400 hover:text-[#D18B73] transition-colors cursor-pointer">¿La
            olvidaste?</a>
        </div>
        <input type="password" formControlName="contrasena" placeholder="••••••••" autocomplete="new-contra"
          style="font-size: 1rem; letter-spacing: 0.3em;"
          class="g-text w-full px-3 py-3 rounded-xl border border-olive-200 text-sm focus:outline-none focus:border-[#ff8B64] focus:ring-1 focus:ring-[#D18B73] transition-all bg-olive-300">
      </div>

      <button type="submit" [disabled]="loginForm.invalid"
        class="g-text w-full bg-[#ff8B64] hover:bg-[#bd7a63] disabled:bg-olive-400 disabled:cursor-not-allowed text-white font-medium py-3 rounded-xl transition-all shadow-md active:scale-[0.98] mt-4 text-sm cursor-pointer">
        Entrar a mi Cuenta
      </button>
    </form>

    <div class="text-center mt-8 pt-6 border-t border-olive-100">
      <p class="text-sm text-olive-500 font-light">
        ¿Aún no tienes cuenta?
        <a [routerLink]="['/register']" class="font-medium text-[#ff8B64] hover:underline transition-all">Regístrate
          aquí</a>
      </p>
    </div>

  </div>
</div>
