<footer class="relative w-full overflow-hidden mt-0 bg-[#f2f2f2]"> <!-- mt-0 para fusionar -->

  <!-- Imagen de fondo (Aseguramos que llene el espacio) -->
  <div class="w-full"> <!-- Color de respaldo por si la imagen tarda en cargar -->
    <img
      src="assets/img/footer.png"
      alt="Footer Flores de la Luna"
      class="w-full h-auto min-h-100 md:min-h-75 object-cover block">
  </div>

  <!-- Contenido principal -->
  <div class="absolute inset-0 flex items-center justify-center py-10">
    <div class="w-full px-6 md:px-12 grid grid-cols-1 md:grid-cols-[1.5fr_3fr_1.5fr] gap-y-10 items-center">

      <!-- Logo con escala responsiva -->
      <a [routerLink]="['/home']" class="flex justify-center md:justify-start">
        <img src="assets/img/LOGO_New2.png" alt="logoo" class="h-32 md:h-52 lg:h-60 object-contain drop-shadow-lg">
      </a>

      <!-- Navegación central -->
      <div class="grid grid-cols-3 gap-x-4 md:gap-x-8 text-white font-montserrat text-xs md:text-sm lg:text-base justify-center text-center tracking-wider">
        <div class="flex flex-col gap-4">
          <a [routerLink]="['/home']" class="hover:text-[#D18B73] transition-colors uppercase">Nosotros</a>
          <a [routerLink]="['/gallery']" class="hover:text-[#D18B73] transition-colors uppercase">Galería</a>
        </div>
        <div class="flex flex-col gap-4">
          <a [routerLink]="['/reservations']" class="hover:text-[#D18B73] transition-colors uppercase">Reservaciones</a>
          <a [routerLink]="['/how-to-get']" class="hover:text-[#D18B73] transition-colors uppercase">Cómo llegar</a>
        </div>
        <div class="flex flex-col gap-4">
          <a [routerLink]="['/cancellations']" class="hover:text-[#D18B73] transition-colors uppercase">Cancelaciones</a>
          <a [routerLink]="['/regulation']" class="hover:text-[#D18B73] transition-colors uppercase">Reglamento</a>
        </div>
      </div>

      <!-- Redes Sociales -->
      <div class="flex flex-col gap-4 text-white items-center md:items-end">
        <h5 class="font-montserrat font-extrabold text-xl md:text-2xl uppercase tracking-[0.2em]">Síguenos</h5>
        <div class="flex gap-4">
          <a href="https://instagram.com/tu-cuenta" target="_blank"
            class="w-11 h-11 rounded-full bg-white/10 hover:bg-[#D18B73] border border-white/20 flex items-center justify-center transition-all group backdrop-blur-sm">
            <i class="fa-brands fa-instagram text-lg group-hover:scale-110 transition-transform"></i>
          </a>

          <a href="https://facebook.com/tu-cuenta" target="_blank"
            class="w-11 h-11 rounded-full bg-white/10 hover:bg-[#D18B73] border border-white/20 flex items-center justify-center transition-all group backdrop-blur-sm">
            <i class="fa-brands fa-facebook-f text-lg group-hover:scale-110 transition-transform"></i>
          </a>

          <a href="https://wa.me/tu-numero" target="_blank"
            class="w-11 h-11 rounded-full bg-white/10 hover:bg-[#D18B73] border border-white/20 flex items-center justify-center transition-all group backdrop-blur-sm">
            <i class="fa-brands fa-whatsapp text-xl group-hover:scale-110 transition-transform"></i>
          </a>
        </div>
      </div>

    </div>
  </div>

  <!-- Copyright -->
  <div class="absolute bottom-4 w-full text-center">
    <p class="font-montserrat text-white/30 text-[9px] md:text-[10px] uppercase tracking-[0.3em]">
      © 2026 Flores de la Luna — Cabañas & Jardín
    </p>
  </div>

</footer>
