<footer class="relative w-full overflow-hidden bg-[#f2f2f0]">
  <div class="absolute inset-0 w-full h-full">
    <img
      src="assets/img/footer.png"
      alt="Footer Flores de la Luna"
      class="w-full h-full object-cover block opacity-90">
  </div>

  <div class="relative z-10 flex flex-col items-center justify-center py-10 px-6">

    <div class="w-full max-w-7xl grid grid-cols-1 md:grid-cols-3 gap-y-10 md:gap-y-0 items-center justify-items-center">

      <a [routerLink]="['/home']" class="flex justify-center">
        <img src="assets/img/LOGO_New2.png" alt="Logo" class="h-32 md:h-48 lg:h-56 object-contain drop-shadow-lg">
      </a>

      <div class="grid grid-cols-2 gap-x-8 md:gap-x-12 text-white g-text text-md md:text-md lg:text-base tracking-wider">
        <div class="flex flex-col gap-4 text-center md:text-right border-r border-white/10 pr-8 md:pr-12">
          <a [routerLink]="['/home']" class="hover:text-[#D18B73] transition-colors">Nosotros</a>
          <a [routerLink]="['/gallery']" class="hover:text-[#D18B73] transition-colors">Galería</a>
          <a [routerLink]="['/reservations']" class="hover:text-[#D18B73] transition-colors">Reservaciones</a>
        </div>
        <div class="flex flex-col gap-4 text-center md:text-left">
          <a [routerLink]="['/how-to-get']" class="hover:text-[#D18B73] transition-colors">Cómo llegar</a>
          <a [routerLink]="['/cancellations']" class="hover:text-[#D18B73] transition-colors">Cancelaciones</a>
          <a [routerLink]="['/regulation']" class="hover:text-[#D18B73] transition-colors">Reglamento</a>
        </div>
      </div>

      <div class="flex flex-col gap-4 text-white items-center">
        <h5 class="g-text font-extrabold text-xl md:text-2xl uppercase tracking-[0.2em]">Síguenos</h5>
        <div class="flex gap-4">
          <a href="https://www.instagram.com/floresdelaluna.mx/" class="w-11 h-11 rounded-full bg-white/10 hover:bg-[#D18B73] border border-white/20 flex items-center justify-center transition-all group backdrop-blur-sm">
            <i class="fa-brands fa-instagram text-lg group-hover:scale-110 transition-transform"></i>
          </a>
          <a href="#" class="w-11 h-11 rounded-full bg-white/10 hover:bg-[#D18B73] border border-white/20 flex items-center justify-center transition-all group backdrop-blur-sm">
            <i class="fa-brands fa-facebook-f text-lg group-hover:scale-110 transition-transform"></i>
          </a>
          <button (click)="enviarWhatsAppInfo()"
                  class="w-11 h-11 rounded-full bg-white/10 hover:bg-[#D18B73] border border-white/20 flex items-center justify-center transition-all group backdrop-blur-sm cursor-pointer">
            <i class="fa-brands fa-whatsapp text-xl group-hover:scale-110 transition-transform"></i>
          </button>
        </div>
      </div>

    </div>

    <div class="mt-12 w-full text-center pt-6">
      <p class="g-text text-white/30 text-[9px] md:text-[10px] uppercase tracking-[0.3em]">
        © 2026 Flores de la Luna — Cabañas & Jardín
      </p>
    </div>
  </div>
</footer>
