<!-- 1. Contenedor Maestro: Controla si el ratón puede interactuar con la capa -->
<div class="sidebar-wrapper" [class.is-visible]="isOpen">

  <!-- 2. Backdrop: El fondo oscuro/borroso -->
  <div class="sidebar-backdrop" (click)="onClose()"></div>

  <!-- 3. Panel: El menú que desliza -->
  <aside class="sidebar-panel">
    <!-- Header -->
    <div class="p-6 flex justify-between items-center border-b border-olive-100">
      <span class="font-montserrat font-bold text-[#D18B73] tracking-widest uppercase text-lg">Menú</span>
      <button (click)="onClose()" class="text-olive-700 p-2">
        <img src="/assets/img/cancel_sidebar.png" alt="cancel-sidebar" class="h-8 w-8">
      </button>
    </div>

    <!-- Links -->
    <nav class="flex flex-col p-6 gap-6 font-montserrat">
      <a routerLink="/home" routerLinkActive="link-activo" (click)="onClose()" class="side-link">Nosotros</a>
      <a routerLink="/gallery" routerLinkActive="link-activo" (click)="onClose()" class="side-link">Galería</a>
      <a routerLink="/reservations" routerLinkActive="link-activo" (click)="onClose()" class="side-link">Reservaciones</a>
      <a routerLink="/how-to-get" routerLinkActive="link-activo" (click)="onClose()" class="side-link">Cómo llegar</a>
      <a routerLink="/cancellations" routerLinkActive="link-activo" (click)="onClose()" class="side-link">Políticas y Cancelaciones</a>
      <a routerLink="/regulation" routerLinkActive="link-activo" (click)="onClose()" class="side-link">Reglamento</a>
    </nav>

    <!-- Footer -->
    <div class="font-montserrat mt-auto p-6 bg-olive-50 border-t border-olive-100">
      <p class="text-[#D18B73] font-medium text-sm mb-2">+52 (812) 2329 9930</p>
      <p class="text-olive-500 text-xs font-light">Jose Felipe Silva S/N El Porvenir, N.L. C.P. 67363</p>
    </div>
  </aside>
</div>
